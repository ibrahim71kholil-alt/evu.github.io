<!DOCTYPE html>
<html>
<head>
    <title>Ibrahim Firebase Auth</title>
</head>
<body>
    <h1>Hello Ibrahim 🔥</h1>
    <h2>Register</h2>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button onclick="register()">Register</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // আপনার প্রজেক্টের একদম সঠিক কনফিগারেশন (1000023108.jpg থেকে নেওয়া)
        const firebaseConfig = {
            apiKey: "AIzaSyCGEgnFT8a-Dbik2W6JqpP88-Pw1WfnecE",
            authDomain: "evu-8921a.firebaseapp.com",
            projectId: "evu-8921a",
            storageBucket: "evu-8921a.firebasestorage.app",
            messagingSenderId: "777966469701",
            appId: "1:777966469701:web:e782d1df25f7246adf592c",
            measurementId: "G-3BFDY5B1CM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // বাটন যাতে ফাংশন খুঁজে পায় তার জন্য window অবজেক্টে রাখা হয়েছে
        window.register = function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            if(!email || !password) {
                alert("দয়া করে ইমেইল এবং পাসওয়ার্ড লিখুন");
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then(() => alert("সাফল্যের সাথে রেজিস্ট্রেশন হয়েছে!"))
                .catch((error) => alert("Error: " + error.message));
        };
    </script>
</body>
</html>
