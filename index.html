<!DOCTYPE html>
<html>
<head>
  <title>Ibrahim Firebase Auth</title>
</head>
<body>

<h2>Register</h2>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>

<h2>Login</h2>
<button onclick="login()">Login</button>

<h2>Reset Password</h2>
<button onclick="resetPassword()">Reset Password</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword,
         sendEmailVerification,
         sendPasswordResetEmail } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRdfZ5WkUzj3jNMV_0PgUFO1Q9kqGDaZ8",
  authDomain: "evugithub.firebaseapp.com",
  projectId: "evugithub",
  storageBucket: "evugithub.firebasestorage.app",
  messagingSenderId: "695511259441",
  appId: "1:695511259441:web:73760b7c1fe5b8309f7810"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then((userCredential) => {
    sendEmailVerification(userCredential.user);
    alert("Registration successful! Check your email for verification.");
  })
  .catch((error) => {
    alert(error.message);
  });
}

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    alert("Login successful!");
  })
  .catch((error) => {
    alert(error.message);
  });
}

window.resetPassword = function() {
  const email = document.getElementById("email").value;

  sendPasswordResetEmail(auth, email)
  .then(() => {
    alert("Password reset email sent!");
  })
  .catch((error) => {
    alert(error.message);
  });
}

</script>

</body>
</html>
